<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Carlos Suarez portfolio - casm">
    <meta name="keywords" content="full-stack, frontend, developer, backend, c#, angular, python, gis, ai"/>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Varela+Round&family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Playwrite+GB+S:ital,wght@0,100..400;1,100..400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <title>{{ page.title }}</title>
</head>
<body>
    <header>
        <img id="casm-logo" src="{{ '/images/casm-logo-small.svg' | relative_url }}" alt="casm logo">
        <nav id="main-nav" class="nav">
            <span class="material-symbols-outlined mobile-menu">menu</span>
            <ul>
                <li><a href="{{ '/' | relative_url }}">Home</a></li>
                <li><a href="{{ '/#services' | relative_url }}">Services</a></li>
                <li><a href="{{ '/#experience' | relative_url }}">Experience</a></li>
                <li><a href="{{ '/#education' | relative_url }}">Education</a></li>
                <li><a href="{{ '/who-i-am' | relative_url }}">Who I am</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <main>
            {{ content }}
        </main>
    </div>
    
    <footer>
        <section class="links">
            <h2>Contact me</h2>
            <ul>
                <li>
                    <a href="mailto:csuarezm.ca@gmail.com">
                        <span class="material-symbols-outlined">email</span>
                    </a>
                </li>
                <li>
                    <a href="https://linkedin.com/carlossuarez" target="_blank" rel="noopener">
                        <span class="linkedIn">in</span>
                    </a>
                </li>
            </ul>
        </section>
        <span>Copyright &copy; {{ 'now' | date: "%Y" }}</span>
    </footer>

    <script type="importmap">
        {
          "imports": {
            "@material/web/": "https://esm.run/@material/web/"
          }
        }
    </script>
    <script type="module">
        import '@material/web/all.js';
        import {styles as typescaleStyles} from '@material/web/typography/md-typescale-styles.js';
        document.adoptedStyleSheets.push(typescaleStyles.styleSheet);
    </script>
    <script src="{{ '/assets/js/script.js' | relative_url }}"></script>
</body>
</html>
